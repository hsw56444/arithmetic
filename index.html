                >
                  이름 바꾸기
                </button>
              </div>

              <h1 className="text-4xl font-black text-indigo-600 mb-6">수학 연산 놀이</h1>
              
              <div className="mb-6">
                <h3 className="text-lg font-bold text-gray-700 mb-3">어떤 문제를 풀까요?</h3>
                <div className="flex gap-2 justify-center">
                  <button
                    onClick={() => handleOperatorSelect('+')}
                    className={`flex-1 py-4 px-1 rounded-2xl font-bold text-base md:text-lg transition-all ${
                      operatorType === '+' ? 'bg-rose-500 text-white shadow-lg scale-105 border-2 border-rose-500' : 'bg-gray-50 text-gray-500 border-2 border-gray-200 hover:bg-gray-100'
                    }`}
                  >
                    더하기 (+)
                  </button>
                  <button
                    onClick={() => handleOperatorSelect('-')}
                    className={`flex-1 py-4 px-1 rounded-2xl font-bold text-base md:text-lg transition-all ${
                      operatorType === '-' ? 'bg-blue-500 text-white shadow-lg scale-105 border-2 border-blue-500' : 'bg-gray-50 text-gray-500 border-2 border-gray-200 hover:bg-gray-100'
                    }`}
                  >
                    빼기 (-)
                  </button>
                  <button
                    onClick={() => handleOperatorSelect('x')}
                    className={`flex-1 py-4 px-1 rounded-2xl font-bold text-base md:text-lg transition-all ${
                      operatorType === 'x' ? 'bg-purple-500 text-white shadow-lg scale-105 border-2 border-purple-500' : 'bg-gray-50 text-gray-500 border-2 border-gray-200 hover:bg-gray-100'
                    }`}
                  >
                    구구단 (x)
                  </button>
                </div>
              </div>

              {operatorType !== 'x' && (
                <div className="space-y-4 animate-bounce-in">
                  <button 
                    onClick={() => handleGameModeSelect('time')}
                    className="w-full flex items-center justify-between p-6 bg-rose-50 hover:bg-rose-100 rounded-2xl border-2 border-rose-200 transition-colors active:scale-95"
                  >
                    <div className="flex items-center gap-4">
                      <div className="bg-rose-500 p-3 rounded-xl text-white">
                        <i className="fa-solid fa-stopwatch text-3xl"></i>
                      </div>
                      <div className="text-left">
                        <h2 className="text-2xl font-bold text-gray-800">1분 타임어택</h2>
                        <p className="text-rose-600 font-medium">1분 동안 몇 문제를 풀까?</p>
                      </div>
                    </div>
                  </button>

                  <button 
                    onClick={() => handleGameModeSelect('count')}
                    className="w-full flex items-center justify-between p-6 bg-teal-50 hover:bg-teal-100 rounded-2xl border-2 border-teal-200 transition-colors active:scale-95"
                  >
                    <div className="flex items-center gap-4">
                      <div className="bg-teal-500 p-3 rounded-xl text-white">
                        <i className="fa-solid fa-bullseye text-3xl"></i>
                      </div>
                      <div className="text-left">
                        <h2 className="text-2xl font-bold text-gray-800">20문제 스피드런</h2>
                        <p className="text-teal-600 font-medium">20문제를 얼마나 빨리 풀까?</p>
                      </div>
                    </div>
                  </button>
                </div>
              )}

              <div className="grid grid-cols-2 gap-3 mt-4">
                <button 
                  onClick={() => { setGameState('records'); setRecordFilter('all'); }}
                  className="w-full flex flex-col items-center justify-center gap-2 p-5 bg-blue-100 hover:bg-blue-200 text-blue-800 rounded-2xl text-lg font-bold transition-colors active:scale-95 border border-blue-300 shadow-sm"
                >
                  <i className="fa-solid fa-cloud-arrow-down text-2xl text-blue-600"></i>
                  클라우드 기록
                </button>
                <button 
                  onClick={() => { setGameState('mistakes'); setMistakeTab('+'); }}
                  className="w-full flex flex-col items-center justify-center gap-2 p-5 bg-red-100 hover:bg-red-200 text-red-800 rounded-2xl text-lg font-bold transition-colors active:scale-95 border border-red-300 shadow-sm"
                >
                  <i className="fa-solid fa-book-open text-2xl text-red-500"></i>
                  나의 오답노트
                </button>
              </div>
            </div>
          </div>
        );
      }

      // 2-1. 구구단 설정 화면
      if (gameState === 'multiplyConfig') {
        const totalQ = multiplyDan === 'all' ? 72 : 9;
        const timeLimit = totalQ * 4;

        return (
          <div className="flex flex-col items-center justify-center min-h-screen bg-indigo-50 p-6 font-sans relative">
            <AcademyHeader />
            <div className="bg-white rounded-3xl shadow-xl p-8 w-full max-w-lg text-center relative mt-10 animate-bounce-in">
              <div className="flex items-center mb-6 border-b-2 border-purple-100 pb-4">
                <button
                  onClick={() => setGameState('menu')}
                  className="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors active:scale-90 absolute left-6"
                >
                  <i className="fa-solid fa-arrow-left text-2xl"></i>
                </button>
                <h1 className="text-3xl font-black text-purple-600 w-full text-center">구구단 설정</h1>
              </div>

              {savedMissionProgress ? (() => {
                const sp = savedMissionProgress;
                const spMission = MISSIONS[sp.missionIdx] || MISSIONS[0];
                const spFilled = Object.keys(sp.missionAnswers || {}).length;
                const spStageLabel = sp.freeFillMode
                  ? '곱셈표 완성하기'
                  : `미션 ${sp.missionIdx + 1} / ${MISSIONS.length}`;
                const handleFreshStart = () => {
                  if (window.confirm('지금까지 풀던 내용을 모두 지우고\n처음부터 다시 시작할까요?')) {
                    startMissionMode();
                  }
                };
                return (
                  <div className="w-full mb-6 p-5 bg-gradient-to-br from-amber-400 to-orange-500 rounded-2xl text-white shadow-lg border-2 border-orange-300">
                    <div className="flex items-center gap-3 mb-4">
                      <div className="bg-white/30 p-3 rounded-xl shrink-0">
                        <i className="fa-solid fa-bookmark text-2xl md:text-3xl"></i>
                      </div>
                      <div className="text-left flex-1">
                        <h2 className="text-lg md:text-xl font-black flex items-center gap-2 flex-wrap">
                          이어서 풀기
                          <span className="text-[10px] md:text-xs bg-white/40 px-2 py-0.5 rounded-full font-bold">진행 중</span>
                        </h2>
                        <p className="text-xs md:text-sm font-medium opacity-95 mt-1">
                          <i className={`fa-solid ${spMission.icon} mr-1`}></i>
                          {spStageLabel} · {spFilled}칸 채움
                        </p>
                      </div>
                    </div>
                    <div className="flex gap-2">
                      <button
                        onClick={resumeMissionMode}
                        className="flex-[2] py-3 bg-white text-orange-600 rounded-xl font-black text-base md:text-lg active:scale-95 shadow-md flex items-center justify-center gap-2"
                      >
                        <i className="fa-solid fa-play"></i> 이어서 하기
                      </button>
                      <button
                        onClick={handleFreshStart}
                        className="flex-1 py-3 bg-white/15 hover:bg-white/25 text-white rounded-xl font-bold text-sm md:text-base active:scale-95 border border-white/40"
                      >
                        처음부터
                      </button>
                    </div>
                  </div>
                );
              })() : (
                <button
                  onClick={startMissionMode}
                  className="w-full mb-6 p-5 bg-gradient-to-br from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600 rounded-2xl text-white shadow-lg active:scale-95 transition-all border-2 border-orange-300"
                >
                  <div className="flex items-center gap-4">
                    <div className="bg-white/30 p-3 rounded-xl shrink-0">
                      <i className="fa-solid fa-flag-checkered text-3xl"></i>
                    </div>
                    <div className="text-left flex-1">
                      <h2 className="text-xl md:text-2xl font-black flex items-center gap-2 flex-wrap">
                        미션 모드
                        <span className="text-[10px] md:text-xs bg-white/40 px-2 py-0.5 rounded-full font-bold">처음 배우는 친구 추천</span>
                      </h2>
                      <p className="text-xs md:text-sm font-medium opacity-95 mt-1">9×9 곱셈표를 채우며 곱셈의 원리를 깨우쳐요!</p>
                    </div>
                  </div>
                </button>
              )}

              <div className="text-xs text-gray-400 font-bold mb-4 flex items-center gap-2">
                <span className="flex-1 border-t border-gray-200"></span>
                <span>또는 도전 모드로 연습하기</span>
                <span className="flex-1 border-t border-gray-200"></span>
              </div>

              <div className="mb-8">
                <h3 className="text-lg font-bold text-gray-700 mb-3">몇 단을 연습할까요?</h3>
                <div className="grid grid-cols-4 gap-2">
                  {[2, 3, 4, 5, 6, 7, 8, 9].map(dan => (
                    <button
                      key={dan}
                      onClick={() => setMultiplyDan(dan.toString())}
                      className={`py-3 rounded-xl font-bold text-lg transition-all ${
                        multiplyDan === dan.toString() ? 'bg-purple-500 text-white shadow-md scale-105' : 'bg-gray-50 text-gray-600 border border-gray-200 hover:bg-gray-100'
                      }`}
                    >
                      {dan}단
                    </button>
                  ))}
                </div>
                <button
                  onClick={() => { setMultiplyDan('all'); }}
                  className={`w-full mt-2 py-4 rounded-xl font-black text-lg transition-all ${
                    multiplyDan === 'all' ? 'bg-purple-600 text-white shadow-lg scale-105 border-2 border-purple-400' : 'bg-purple-50 text-purple-600 border-2 border-purple-200 hover:bg-purple-100'
                  }`}
                >
                  <i className="fa-solid fa-layer-group mr-2"></i> 2~9단 전체
                </button>
              </div>

              <div className="mb-8">
                <h3 className="text-lg font-bold text-gray-700 mb-3">어떻게 풀까요?</h3>
                <div className="flex gap-2">
                  <button onClick={() => setMultiplyOrder('asc')} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${multiplyOrder === 'asc' ? 'bg-indigo-500 text-white shadow-md' : 'bg-gray-50 text-gray-600 border border-gray-200'}`}>
                    <i className="fa-solid fa-arrow-down-1-9 block mb-1 text-lg"></i>순서대로
                  </button>
                  <button onClick={() => setMultiplyOrder('desc')} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${multiplyOrder === 'desc' ? 'bg-indigo-500 text-white shadow-md' : 'bg-gray-50 text-gray-600 border border-gray-200'}`}>
                    <i className="fa-solid fa-arrow-up-9-1 block mb-1 text-lg"></i>거꾸로
                  </button>
                  <button onClick={() => setMultiplyOrder('random')} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${multiplyOrder === 'random' ? 'bg-indigo-500 text-white shadow-md' : 'bg-gray-50 text-gray-600 border border-gray-200'}`}>
                    <i className="fa-solid fa-shuffle block mb-1 text-lg"></i>섞어서
                  </button>
                </div>
              </div>

              <div className="space-y-3 border-t-2 border-purple-100 pt-6">
                <p className="text-gray-500 font-bold text-sm mb-3">어떤 모드로 도전할까요?</p>
                <div className="space-y-3">
                  <button 
                    onClick={() => handleGameModeSelect('time')}
                    className="w-full flex items-center justify-between p-5 bg-rose-50 hover:bg-rose-100 rounded-2xl border-2 border-rose-200 transition-colors active:scale-95"
                  >
                    <div className="flex items-center gap-4">
                      <div className="bg-rose-500 p-3 rounded-xl text-white">
                        <i className="fa-solid fa-stopwatch text-2xl md:text-3xl"></i>
                      </div>
                      <div className="text-left">
                        <h2 className="text-xl md:text-2xl font-bold text-gray-800">타임어택</h2>
                        <p className="text-rose-600 font-medium text-sm md:text-base">{timeLimit}초 안에 {totalQ}문제 모두 풀기!</p>
                      </div>
                    </div>
                  </button>

                  <button 
                    onClick={() => handleGameModeSelect('count')}
                    className="w-full flex items-center justify-between p-5 bg-teal-50 hover:bg-teal-100 rounded-2xl border-2 border-teal-200 transition-colors active:scale-95"
                  >
                    <div className="flex items-center gap-4">
                      <div className="bg-teal-500 p-3 rounded-xl text-white">
                        <i className="fa-solid fa-bullseye text-2xl md:text-3xl"></i>
                      </div>
                      <div className="text-left">
                        <h2 className="text-xl md:text-2xl font-bold text-gray-800">스피드런</h2>
                        <p className="text-teal-600 font-medium text-sm md:text-base">{totalQ}문제를 최대한 빨리 풀기!</p>
                      </div>
                    </div>
                  </button>
                </div>
              </div>
            </div>
          </div>
        )
      }

      if (gameState === 'intro') {
        let introTitle = "";
        let introDesc = "";
        
        if (operatorType === 'x') {
          const danText = multiplyDan === 'all' ? "2~9단 전체" : `${multiplyDan}단`;
          const orderText = multiplyOrder === 'asc' ? "순서대로" : (multiplyOrder === 'desc' ? "거꾸로" : "섞어서");
          const modeText = gameMode === 'time' ? "타임어택" : "스피드런";
          introTitle = `${danText} / ${orderText} / ${modeText}`;

          const totalQ = multiplyDan === 'all' ? 72 : 9;
          const timeLimit = totalQ * 4; 
          
          let startStr = "";
          let endStr = "";
          if (multiplyDan === 'all') {
              startStr = multiplyOrder === 'desc' ? "9x9" : "2x1";
              endStr = multiplyOrder === 'desc' ? "2x1" : "9x9";
          } else {
              startStr = multiplyOrder === 'desc' ? `${multiplyDan}x9` : `${multiplyDan}x1`;
              endStr = multiplyOrder === 'desc' ? `${multiplyDan}x1` : `${multiplyDan}x9`;
          }

          if (gameMode === 'time') {
              if (multiplyOrder === 'random') {
                 introDesc = `총 ${totalQ}문제를 ${timeLimit}초 안에 풀어야 성공입니다!`;
              } else {
                 introDesc = `${startStr}부터 ${endStr}까지 ${timeLimit}초 안에 풀어야 성공입니다!`;
              }
          } else {
              if (multiplyOrder === 'random') {
                 introDesc = `총 ${totalQ}문제를 최대한 빨리 푸는 모드입니다.`;
              } else {
                 introDesc = `${startStr}부터 ${endStr}까지 총 ${totalQ}문제를 최대한 빨리 푸는 모드입니다.`;
              }
          }
        } else {
          const opText = operatorType === '+' ? '더하기 연습' : '빼기 연습';
          const modeText = gameMode === 'time' ? "타임어택" : "스피드런";
          introTitle = `${opText} / ${modeText}`;
          if (gameMode === 'time') {
              introDesc = `1분 동안 최대한 많은 문제를 풀어보세요!`;
          } else {
              introDesc = `20문제를 최대한 빨리 풀어보세요!`;
          }
        }

        return (
          <div className="flex flex-col items-center justify-center min-h-screen bg-indigo-50 p-6 font-sans relative">
            <AcademyHeader />
            <div className="bg-white rounded-3xl shadow-xl p-10 w-full max-w-lg text-center animate-bounce-in border-t-8 border-yellow-400 mt-10">
              <div className="bg-yellow-100 p-6 rounded-full text-yellow-500 mb-6 inline-block">
                <i className="fa-solid fa-circle-info text-6xl"></i>
              </div>
              <h1 className="text-3xl font-black text-gray-800 mb-4">{introTitle}</h1>
              <p className="text-xl text-indigo-600 mb-8 font-bold leading-relaxed">{introDesc}</p>
              
              <div className="flex gap-3">
                <button onClick={() => setGameState(operatorType === 'x' ? 'multiplyConfig' : 'menu')} className="flex-1 py-4 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-2xl font-bold text-xl transition-colors active:scale-95">
                  뒤로가기
                </button>
                <button onClick={startActualGame} className="flex-[2] py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-black text-xl transition-colors active:scale-95 shadow-lg flex items-center justify-center gap-2">
                  <i className="fa-solid fa-play"></i> 시작하기
                </button>
              </div>
            </div>
          </div>
        );
      }

      // --- 3. 오답노트 (Mistakes) 화면 ---
      if (gameState === 'mistakes') {
        const currentMistakes = mistakeStats[mistakeTab] || [];

        return (
          <div className="flex flex-col items-center justify-center min-h-screen bg-indigo-50 p-6 font-sans relative">
            <AcademyHeader />
            <div className="bg-white rounded-3xl shadow-xl w-full max-w-2xl p-6 flex flex-col h-[90vh] md:h-[700px] animate-bounce-in relative mt-10">
              
              {isLoadingRecords && (
                <div className="absolute inset-0 bg-white bg-opacity-80 rounded-3xl flex flex-col items-center justify-center z-10 backdrop-blur-sm">
                  <div className="loader mb-4"></div>
                  <p className="text-blue-600 font-bold">오답노트를 불러오는 중...</p>
                </div>
              )}

              <div className="flex items-center mb-6">
                <button 
                  onClick={() => setGameState('menu')} 
                  className="p-3 text-gray-500 hover:bg-gray-100 rounded-full transition-colors active:scale-90"
                >
                  <i className="fa-solid fa-arrow-left text-2xl"></i>
                </button>
                <div className="flex-1 text-center pr-10">
                  <h1 className="text-2xl font-black text-red-500 flex items-center justify-center gap-2">
                    <i className="fa-solid fa-book-open"></i> 나의 오답노트
                  </h1>
                </div>
              </div>
              
              <div className="flex gap-2 mb-6 px-1">
                <button onClick={() => setMistakeTab('+')} className={`flex-1 py-3 rounded-xl font-bold text-sm md:text-base transition-all ${mistakeTab === '+' ? 'bg-indigo-500 text-white shadow-md scale-105' : 'bg-gray-50 text-gray-500 border border-gray-200 hover:bg-gray-100'}`}>더하기</button>
                <button onClick={() => setMistakeTab('-')} className={`flex-1 py-3 rounded-xl font-bold text-sm md:text-base transition-all ${mistakeTab === '-' ? 'bg-blue-500 text-white shadow-md scale-105' : 'bg-gray-50 text-gray-500 border border-gray-200 hover:bg-gray-100'}`}>빼기</button>
                <button onClick={() => setMistakeTab('x')} className={`flex-1 py-3 rounded-xl font-bold text-sm md:text-base transition-all ${mistakeTab === 'x' ? 'bg-purple-500 text-white shadow-md scale-105' : 'bg-gray-50 text-gray-500 border border-gray-200 hover:bg-gray-100'}`}>구구단</button>
              </div>

              <div className="overflow-y-auto flex-1 pr-2 custom-scrollbar mb-4">
                {!isLoadingRecords && currentMistakes.length === 0 ? (
                  <div className="flex flex-col items-center justify-center h-full text-gray-400">
                    <i className="fa-solid fa-face-laugh-beam text-6xl mb-4 text-green-400 opacity-80"></i>
                    <p className="text-xl font-bold text-gray-600">완벽해요!</p>
                    <p className="text-sm mt-1">이 유형은 틀린 문제가 하나도 없습니다.</p>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {currentMistakes.map((m, idx) => (
                      <div key={idx} className="flex justify-between items-center p-4 md:p-5 bg-red-50 border border-red-100 rounded-2xl transition-colors hover:border-red-300">
                        <div className="text-3xl font-black text-gray-800 tracking-wider">
                          {m.num1} <span className={m.operator === '+' ? 'text-indigo-500' : m.operator === '-' ? 'text-blue-500' : 'text-purple-500'}>{m.operator}</span> {m.num2}
                        </div>
                        <div className="text-base md:text-lg font-bold text-red-500 bg-white px-3 py-1 rounded-lg border border-red-100 shadow-sm">
                          {m.count}번 틀림
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <button 
                onClick={() => startMistakePractice(mistakeTab)}
                disabled={currentMistakes.length === 0}
                className={`w-full py-5 rounded-2xl text-xl font-black transition-colors shadow-lg flex items-center justify-center gap-2 
                  ${currentMistakes.length > 0 ? 'bg-red-500 hover:bg-red-600 text-white active:scale-95' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
              >
                <i className="fa-solid fa-pen-to-square"></i> 
                {currentMistakes.length > 0 ? `이 유형 오답 모아 풀기 (${currentMistakes.length}문제)` : '풀 오답이 없습니다'}
              </button>
            </div>
          </div>
        );
      }

      // 4. 기록 보기 화면
      if (gameState === 'records') {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen bg-indigo-50 p-6 font-sans relative">
            <AcademyHeader />
            <div className="bg-white rounded-3xl shadow-xl w-full max-w-2xl p-6 flex flex-col h-[90vh] md:h-[700px] animate-bounce-in relative mt-10">
              
              {isLoadingRecords && (
                <div className="absolute inset-0 bg-white bg-opacity-80 rounded-3xl flex flex-col items-center justify-center z-10 backdrop-blur-sm">
                  <div className="loader mb-4"></div>
                  <p className="text-blue-600 font-bold">클라우드에서 기록을 불러오는 중...</p>
                </div>
              )}

              <div className="flex items-center mb-6">
                <button 
                  onClick={() => setGameState('menu')} 
                  className="p-3 text-gray-500 hover:bg-gray-100 rounded-full transition-colors active:scale-90"
                >
                  <i className="fa-solid fa-arrow-left text-2xl"></i>
                </button>
                <div className="flex-1 text-center pr-10">
                  <h1 className="text-2xl font-black text-blue-600 flex items-center justify-center gap-2">
                    <i className="fa-solid fa-cloud text-blue-400"></i> {currentUser}의 클라우드 기록
                  </h1>
                </div>
              </div>
              
              <div className="flex gap-2 mb-6 px-1">
                <button onClick={() => setRecordFilter('all')} className={`flex-1 py-3 rounded-xl font-bold text-sm md:text-base transition-all ${recordFilter === 'all' ? 'bg-blue-600 text-white shadow-md scale-105' : 'bg-gray-50 text-gray-500 border border-gray-200 hover:bg-gray-100'}`}>전체</button>
                <button onClick={() => setRecordFilter('+')} className={`flex-1 py-3 rounded-xl font-bold text-sm md:text-base transition-all ${recordFilter === '+' ? 'bg-indigo-500 text-white shadow-md scale-105' : 'bg-gray-50 text-gray-500 border border-gray-200 hover:bg-gray-100'}`}>더하기</button>
                <button onClick={() => setRecordFilter('-')} className={`flex-1 py-3 rounded-xl font-bold text-sm md:text-base transition-all ${recordFilter === '-' ? 'bg-blue-500 text-white shadow-md scale-105' : 'bg-gray-50 text-gray-500 border border-gray-200 hover:bg-gray-100'}`}>빼기</button>
                <button onClick={() => setRecordFilter('x')} className={`flex-1 py-3 rounded-xl font-bold text-sm md:text-base transition-all ${recordFilter === 'x' ? 'bg-purple-500 text-white shadow-md scale-105' : 'bg-gray-50 text-gray-500 border border-gray-200 hover:bg-gray-100'}`}>구구단</button>
              </div>

              <div className="overflow-y-auto flex-1 pr-2 custom-scrollbar">
                {!isLoadingRecords && records.length === 0 ? (
                  <div className="flex flex-col items-center justify-center h-full text-gray-400">
                    <i className="fa-solid fa-cloud-arrow-up text-5xl mb-4 opacity-50"></i>
                    <p className="text-lg font-bold">아직 클라우드에 기록이 없어요!</p>
                    <p className="text-sm mt-1">게임을 플레이하면 자동으로 동기화됩니다.</p>
                  </div>
                ) : !isLoadingRecords && filteredRecords.length === 0 ? (
                  <div className="flex flex-col items-center justify-center h-full text-gray-400">
                    <i className="fa-solid fa-folder-open text-5xl mb-4 opacity-50"></i>
                    <p className="text-lg font-bold">해당 유형의 기록이 없어요!</p>
                  </div>
                ) : (
                  <>
                    <div className="bg-indigo-600 rounded-2xl p-5 mb-8 text-white shadow-lg">
                      <h2 className="text-xl font-bold mb-4 flex items-center gap-2">
                        <i className="fa-solid fa-chart-pie text-yellow-300"></i> 나의 실력 요약
                      </h2>
                      <div className="grid grid-cols-3 gap-3">
                        <div className="bg-indigo-500 rounded-xl p-3 text-center">
                          <p className="text-indigo-200 text-xs md:text-sm font-bold mb-1">오늘 푼 문제</p>
                          <p className="text-xl md:text-2xl font-black text-white">{todayTotalSolved}<span className="text-sm ml-1 font-normal">개</span></p>
                        </div>
                        <div className="bg-indigo-500 rounded-xl p-3 text-center">
                          <p className="text-rose-200 text-xs md:text-sm font-bold mb-1">타임어택 1등</p>
                          <p className="text-xl md:text-2xl font-black text-white">{bestTimeScore}<span className="text-sm ml-1 font-normal">개</span></p>
                        </div>
                        <div className="bg-indigo-500 rounded-xl p-3 text-center">
                          <p className="text-teal-200 text-xs md:text-sm font-bold mb-1">스피드런 1등</p>
                          <p className="text-xl md:text-2xl font-black text-white">{bestCountTime ? formatTime(bestCountTime) : '-'}</p>
                        </div>
                      </div>
                    </div>

                    <div className="mb-8">
                      <h3 className="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2 border-b-2 border-indigo-100 pb-2">
                        <i className="fa-solid fa-calendar-day text-indigo-500"></i> 오늘의 기록
                      </h3>
                      {todayRecords.length === 0 ? (
                        <p className="text-gray-400 text-center py-4 text-sm font-bold">오늘 플레이한 기록이 없어요.</p>
                      ) : (
                        <div className="space-y-3">
                          {todayRecords.map(record => (
                            <RecordItem key={record.id} record={record} formatTime={formatTime} formatDate={formatDate} isToday={true} />
                          ))}
                        </div>
                      )}
                    </div>

                    <div>
                      <h3 className="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2 border-b-2 border-gray-200 pb-2">
                        <i className="fa-solid fa-clock-rotate-left text-gray-500"></i> 이전 기록
                      </h3>
                      {pastRecords.length === 0 ? (
                        <p className="text-gray-400 text-center py-4 text-sm font-bold">이전 기록이 없어요.</p>
                      ) : (
                        <div className="space-y-3">
                          {pastRecords.map(record => (
                            <RecordItem key={record.id} record={record} formatTime={formatTime} formatDate={formatDate} isToday={false} />
                          ))}
                        </div>
                      )}
                    </div>
                  </>
                )}
              </div>
            </div>
          </div>
        );
      }

      // 5. 결과 화면
      if (gameState === 'result') {
        const isMultiTimeAttack = operatorType === 'x' && gameMode === 'time';
        const isSuccess = isMultiTimeAttack ? score >= totalProblemsRef.current : true;

        return (
          <div className="flex flex-col items-center justify-center min-h-screen bg-indigo-50 p-6 font-sans relative">
            <AcademyHeader />
            <div className="bg-white rounded-3xl shadow-xl p-10 w-full max-w-lg text-center flex flex-col items-center animate-bounce-in relative overflow-hidden mt-10">
              
              <div className="absolute top-4 right-4 text-blue-500 flex items-center gap-1 text-xs font-bold bg-blue-50 px-3 py-1 rounded-full border border-blue-100">
                <i className="fa-solid fa-cloud-arrow-up"></i> 클라우드 저장됨
              </div>

              {isMultiTimeAttack ? (
                isSuccess ? (
                  <>
                    <div className="bg-green-100 p-6 rounded-full text-green-500 mb-6 shadow-inner mt-4">
                      <i className="fa-solid fa-crown text-6xl"></i>
                    </div>
                    <h1 className="text-4xl font-black text-green-600 mb-2">성공! 대단해요!</h1>
                    <p className="text-xl font-bold text-gray-600 mb-8">모든 문제를 시간 안에 다 풀었어요!</p>
                  </>
                ) : (
                  <>
                    <div className="bg-red-100 p-6 rounded-full text-red-500 mb-6 shadow-inner mt-4">
                      <i className="fa-solid fa-clock text-6xl"></i>
                    </div>
                    <h1 className="text-4xl font-black text-red-600 mb-2">시간 초과!</h1>
                    <p className="text-xl font-bold text-gray-600 mb-8">아쉽지만 다음엔 꼭 성공할 수 있어요!</p>
                  </>
                )
              ) : gameMode === 'mistake_practice' ? (
                <>
                  <div className="bg-orange-100 p-6 rounded-full text-orange-500 mb-6 shadow-inner mt-4">
                    <i className="fa-solid fa-pen-to-square text-6xl"></i>
                  </div>
                  <h1 className="text-4xl font-black text-gray-800 mb-2">오답 풀기 완료!</h1>
                  <p className="text-xl font-bold text-indigo-500 mb-8">틀렸던 문제들을 완벽하게 복습했어요!</p>
                </>
              ) : (
                <>
                  <div className="bg-yellow-100 p-6 rounded-full text-yellow-500 mb-6 shadow-inner mt-4">
                    <i className="fa-solid fa-trophy text-6xl"></i>
                  </div>
                  <h1 className="text-4xl font-black text-gray-800 mb-2">게임 종료!</h1>
                  <p className="text-xl font-bold text-indigo-500 mb-8">수고했어요, {currentUser} 친구!</p>
                </>
              )}
              
              <div className="bg-gray-50 rounded-2xl p-6 w-full mb-8 border border-gray-100 shadow-sm">
                {gameMode === 'time' ? (
                  <div className="text-center">
                    <p className="text-gray-500 text-lg mb-1 font-bold">제한 시간 동안 맞힌 문제</p>
                    <p className="text-6xl font-black text-indigo-600">{score}<span className="text-3xl text-gray-400 ml-2">/ {operatorType === 'x' ? totalProblemsRef.current : '문제'}</span></p>
                  </div>
                ) : (
                  <div className="text-center">
                    <p className="text-gray-500 text-lg mb-1 font-bold">{totalProblemsRef.current}문제를 푼 시간</p>
                    <p className="text-6xl font-black text-teal-600">{formatTime(time)}</p>
                  </div>
                )}
              </div>

              <div className="flex gap-4 w-full">
                <button 
                  onClick={() => { setGameState('records'); setRecordFilter('all'); }}
                  className="flex-1 py-5 bg-white text-blue-600 border-2 border-blue-500 hover:bg-blue-50 rounded-2xl text-xl font-bold transition-colors active:scale-95"
                >
                  클라우드 확인
                </button>
                <button 
                  onClick={() => setGameState('menu')}
                  className="flex-[2] flex items-center justify-center gap-2 py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl text-xl font-bold transition-colors active:scale-95 shadow-md"
                >
                  <i className="fa-solid fa-rotate-left text-xl"></i>
                  메뉴로
                </button>
              </div>
            </div>
          </div>
        );
      }

      // 5-1. 미션 모드 화면
      if (gameState === 'mission') {
        const currentMission = MISSIONS[missionIdx];
        const missionCells = allMissionCells(currentMission);
        const totalEligible = freeFillMode ? 81 : missionCells.length;
        const completedInMission = freeFillMode
          ? Object.keys(missionAnswers).length
          : missionCells.filter(([r,c]) => missionAnswers[`${r}-${c}`]).length;

        return (
          <div className="flex flex-col h-[100dvh] font-sans relative pt-10 overflow-hidden bg-gradient-to-b from-amber-50 to-orange-50">
            <AcademyHeader />

            {showExitModal && (
              <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
                <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full text-center animate-bounce-in">
                  <div className="bg-amber-100 p-4 rounded-full text-amber-500 inline-block mb-4">
                    <i className="fa-solid fa-bookmark text-4xl"></i>
                  </div>
                  <h2 className="text-2xl font-black text-gray-800 mb-2">잠깐, 나가시겠어요?</h2>
                  <p className="text-gray-600 mb-8 font-medium">진행 상황은 <span className="text-amber-600 font-bold">자동으로 저장</span>돼서<br/>다음에 <span className="text-amber-600 font-bold">이어서 풀 수</span> 있어요!</p>
                  <div className="flex gap-3">
                    <button onClick={() => setShowExitModal(false)} className="flex-1 py-4 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-2xl font-bold text-lg transition-colors active:scale-95">
                      계속 풀기
                    </button>
                    <button onClick={handleExitGame} className="flex-1 py-4 bg-amber-500 hover:bg-amber-600 text-white rounded-2xl font-bold text-lg transition-colors shadow-md active:scale-95">
                      나가기
                    </button>
                  </div>
                </div>
              </div>
            )}

            {showMissionComplete && MISSIONS[missionIdx + 1] && (() => {
              const nextM = MISSIONS[missionIdx + 1];
              const nextColors = {
                yellow: { from: 'from-yellow-300', via: 'via-amber-400', to: 'to-orange-400', ring: 'ring-amber-200', text: 'text-amber-700' },
                rose: { from: 'from-rose-300', via: 'via-pink-400', to: 'to-fuchsia-400', ring: 'ring-rose-200', text: 'text-rose-700' },
                teal: { from: 'from-teal-300', via: 'via-cyan-400', to: 'to-sky-400', ring: 'ring-cyan-200', text: 'text-cyan-700' },
                indigo: { from: 'from-indigo-300', via: 'via-violet-400', to: 'to-purple-500', ring: 'ring-violet-200', text: 'text-violet-700' },
                pink: { from: 'from-pink-300', via: 'via-rose-400', to: 'to-red-400', ring: 'ring-pink-200', text: 'text-pink-700' },
              };
              const nc = nextColors[nextM.color] || nextColors.yellow;
              return (
                <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/55 backdrop-blur-sm px-4">
                  <div className="relative bg-white rounded-[2rem] md:rounded-[2.5rem] shadow-2xl max-w-lg w-full text-center animate-bounce-in overflow-hidden">
                    {/* 상단 축하 띠 */}

                        {/* 헤더 배지 */}
                        <div className="flex items-center justify-center mb-3 md:mb-4">
                          <div className={`inline-flex items-center gap-2 bg-gradient-to-r ${gradCls} text-white px-4 py-1.5 md:px-5 md:py-2 rounded-full font-black text-xs md:text-sm shadow-md`}>
                            <i className={`fa-solid ${m.icon}`}></i>
                            <span>{isReverseMode ? '순서를 바꿔도 답은 같아요!' : '이 칸을 채워봐요!'}</span>
                          </div>
                        </div>

                        {/* 역방향 모드: 위에 방금 푼 식 회색으로 표시 */}
                        {isReverseMode && (
                          <p className="text-center text-base md:text-xl font-black text-gray-300 mb-2">
                            {c} × {r} = {mirrorVal}
                          </p>
                        )}

                        {/* 큰 곱셈식 + 입력 */}
                        <div className="text-center mb-3 md:mb-4">
                          {isReverseMode ? (
                            <div className="inline-flex items-baseline gap-2 md:gap-3 flex-wrap justify-center">
                              {/* 첫째 인수(=r) 입력 박스 */}
                              {(() => {
                                const filled = reverseFactors[0];
                                const isFocus = reverseFocusIdx === 0 && !popupSuccess;
                                let cls = "inline-flex items-center justify-center min-w-[3rem] md:min-w-[4.5rem] h-14 md:h-20 px-2 text-3xl md:text-5xl font-black rounded-xl md:rounded-2xl border-[3px] transition-all ";
                                if (filled !== null) cls += "bg-rose-100 border-rose-400 text-rose-600 ";
                                else if (isFocus) cls += reverseShake ? "animate-shake bg-red-50 border-red-500 text-red-600 " : "bg-white border-blue-500 text-blue-600 animate-pulse ";
                                else cls += "bg-gray-50 border-gray-200 text-gray-300 ";
                                return <span className={cls}>{filled !== null ? filled : (isFocus ? <span className="text-gray-300">?</span> : '')}</span>;
                              })()}
                              <span className="text-3xl md:text-5xl font-black text-purple-500">×</span>
                              {/* 둘째 인수(=c) 입력 박스 */}
                              {(() => {
                                const filled = reverseFactors[1];
                                const isFocus = reverseFocusIdx === 1 && !popupSuccess;
                                let cls = "inline-flex items-center justify-center min-w-[3rem] md:min-w-[4.5rem] h-14 md:h-20 px-2 text-3xl md:text-5xl font-black rounded-xl md:rounded-2xl border-[3px] transition-all ";
                                if (filled !== null) cls += "bg-rose-100 border-rose-400 text-rose-600 ";
                                else if (isFocus) cls += reverseShake ? "animate-shake bg-red-50 border-red-500 text-red-600 " : "bg-white border-blue-500 text-blue-600 animate-pulse ";
                                else cls += "bg-gray-50 border-gray-200 text-gray-300 ";
                                return <span className={cls}>{filled !== null ? filled : (isFocus ? <span className="text-gray-300">?</span> : '')}</span>;
                              })()}
                              <span className="text-3xl md:text-5xl font-black text-gray-400">=</span>
                              <span className="text-3xl md:text-5xl font-black text-orange-500">{correctAnswer}</span>
                            </div>
                          ) : (
                            <div className="inline-flex items-baseline gap-2 md:gap-4">
                              <span className="text-4xl md:text-6xl font-black text-gray-800">{r}</span>
                              <span className="text-4xl md:text-6xl font-black text-purple-500">×</span>
                              <span className="text-4xl md:text-6xl font-black text-gray-800">{c}</span>
                              <span className="text-4xl md:text-6xl font-black text-gray-400">=</span>
                              {popupSuccess ? (
                                <span className="text-4xl md:text-6xl font-black text-green-500">{correctAnswer}</span>
                              ) : (
                                <span className={`inline-flex items-center justify-center min-w-[3rem] md:min-w-[5rem] h-14 md:h-20 px-2 text-4xl md:text-6xl font-black rounded-xl md:rounded-2xl border-[3px] ${cellShake ? 'animate-shake bg-red-50 border-red-500 text-red-600' : 'bg-white border-orange-500 text-orange-600 animate-pulse'}`}>
                                  {missionInput || <span className="text-gray-300">?</span>}
                                </span>
                              )}
                            </div>
                          )}
                        </div>

                        {popupSuccess ? (
                          <div className="text-center">
                            <div className="inline-flex items-center gap-2 bg-green-100 text-green-700 px-3 py-1.5 md:px-4 md:py-2 rounded-full font-black text-xs md:text-base">
                              <i className="fa-solid fa-circle-check"></i>
                              <span>정답이에요!</span>
                            </div>
                          </div>
                        ) : (
                          <p className="text-center text-[11px] md:text-sm text-gray-400 font-medium">
                            {isReverseMode ? '두 칸을 차례로 채워봐요' : '아래 키패드로 답을 입력해봐요'}
                          </p>
                        )}
                      </div>
                    </div>
                  );
                })()}

                <div className="mission-grid-area flex-1 min-h-0 w-full flex items-center justify-center">
                  <div className="mission-grid-wrap">
                  <div className="grid grid-cols-10 gap-[2px] bg-gray-300 p-[2px] rounded-lg shadow-md h-full">
                    {Array.from({ length: 100 }, (_, i) => {
                      const row = Math.floor(i / 10);
                      const col = i % 10;
                      if (row === 0 && col === 0) {
                        return (
                          <div key={i} className="aspect-square bg-purple-500 text-white flex items-center justify-center font-black text-[10px] md:text-sm lg:text-base rounded">
                            ×
                          </div>
                        );
                      }
                      if (row === 0) {
                        return (
                          <div key={i} className="aspect-square bg-purple-100 text-purple-700 flex items-center justify-center font-black text-[10px] md:text-sm lg:text-base rounded">
                            {col}
                          </div>
                        );
                      }
                      if (col === 0) {
                        return (
                          <div key={i} className="aspect-square bg-purple-100 text-purple-700 flex items-center justify-center font-black text-[10px] md:text-sm lg:text-base rounded">
                            {row}
                          </div>
                        );
                      }
                      const r = row, c = col;
                      const cellKey = `${r}-${c}`;
                      const filled = missionAnswers[cellKey];
                      const inPopupList = !freeFillMode && isPopupCell(currentMission, r, c);
                      const inManualList = !freeFillMode && (currentMission.manualCells || []).some(([pr,pc]) => pr === r && pc === c);
                      const isTarget = (inPopupList || inManualList) && !filled;
                      const isActive = activeCell && activeCell.r === r && activeCell.c === c;
                      const shakeNow = isActive && cellShake;
                      const justFilled = filled && cellKey === recentlyFilledKey;
                      // 수동 단계인지(=모든 팝업 셀이 채워졌는지)
                      const popupPhaseDone = !freeFillMode && (currentMission.popupCells || []).every(([pr,pc]) => missionAnswers[`${pr}-${pc}`]);
                      const inManualPhase = popupPhaseDone && inManualList && !filled;
                      const inFreeFillEmpty = freeFillMode && !filled;

                      let cls = "aspect-square flex items-center justify-center font-black rounded transition-all text-[10px] md:text-sm lg:text-base ";
                      let content = null;

                      if (isActive) {
                        cls += "bg-white border-[3px] border-blue-500 text-blue-600 shadow-md cursor-pointer ";
                        if (shakeNow) cls += "animate-shake bg-red-50 border-red-500 text-red-600 ";
                        // 팝업 셀이 아니면 셀에 직접 입력값 표시 (자유채우기/수동 단계)
                        content = (!inPopupList && missionInput) ? missionInput : <span className="text-gray-300">?</span>;
                      } else if (filled) {
                        cls += "bg-green-100 text-green-700 ";
                        if (justFilled) cls += "animate-cell-pop ";
                        content = filled;
                      } else if (inFreeFillEmpty) {
                        // 자유 채우기 단계: 빈 칸은 부드럽게 빛남
                        cls += "bg-amber-50 border-2 border-amber-300 text-amber-600 cursor-pointer hover:bg-amber-100 animate-glow-pulse ";
                      } else if (inManualPhase) {
                        // 수동 단계의 채울 칸 — 강하게 빛나는 효과
                        cls += "bg-yellow-100 border-[3px] border-amber-400 text-amber-700 cursor-pointer hover:bg-yellow-200 animate-glow-pulse shadow-md ";
                      } else if (isTarget) {
                        cls += "bg-yellow-50 border-2 border-yellow-300 ";
                        if (inPopupList && !popupPhaseDone) cls += "animate-pulse ";
                      } else {
                        cls += "bg-gray-50 text-gray-300 ";
                      }

                      return (
                        <div
                          key={i}
                          ref={(el) => { cellRefs.current[cellKey] = el; }}
                          className={cls}
                          onClick={() => handleCellClick(r, c)}
                          style={{ touchAction: 'manipulation' }}
                        >
                          {content}
                        </div>
                      );
                    })}
                  </div>
                </div>
                </div>

                {/* 현재 풀고 있는 식 표시 (세로 화면에서만 표시 — 가로에서는 키패드 영역에 표시) */}
                {activeCell && (
                  <div className="text-center lg:hidden">
                    <div className="inline-flex items-center gap-1.5 md:gap-2 bg-white px-3 py-1 md:px-4 md:py-1.5 rounded-xl md:rounded-2xl shadow-sm border-2 border-orange-200">
                      <span className="text-sm md:text-lg font-black text-gray-800">{activeCell.r}</span>
                      <span className="text-sm md:text-lg font-black text-purple-500">×</span>
                      <span className="text-sm md:text-lg font-black text-gray-800">{activeCell.c}</span>
                      <span className="text-sm md:text-lg font-black text-gray-400">=</span>
                      <span className={`text-sm md:text-lg font-black ${cellShake ? 'text-red-500' : 'text-orange-500'} min-w-[1.25rem] text-left`}>
                        {missionInput || '?'}
                      </span>
                    </div>
                  </div>
                )}
              </div>

              {/* 키패드 영역 */}
              <div className="shrink-0 lg:w-72 xl:w-80 flex flex-col gap-1 md:gap-2 lg:gap-3 lg:justify-center">
                {/* 가로 화면 전용: 현재 풀고 있는 식 (키패드 위) */}
                {activeCell && (
                  <div className="hidden lg:flex justify-center">
                    <div className="inline-flex items-center gap-3 bg-white px-5 py-3 rounded-2xl shadow-sm border-2 border-orange-200">
                      <span className="text-2xl font-black text-gray-800">{activeCell.r}</span>
                      <span className="text-2xl font-black text-purple-500">×</span>
                      <span className="text-2xl font-black text-gray-800">{activeCell.c}</span>
                      <span className="text-2xl font-black text-gray-400">=</span>
                      <span className={`text-2xl font-black ${cellShake ? 'text-red-500' : 'text-orange-500'} min-w-[1.75rem] text-left`}>
                        {missionInput || '?'}
                      </span>
                    </div>
                  </div>
                )}

                <div className="bg-white rounded-2xl lg:rounded-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.05)] lg:shadow-lg p-1.5 md:p-2 lg:p-4 z-20 relative">
                  <div className="max-w-md mx-auto grid grid-cols-3 gap-1 md:gap-1.5 lg:gap-3">
                    {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => (
                      <button
                        key={num}
                        onClick={() => handleMissionInput(num.toString())}
                        className="bg-gray-50 hover:bg-orange-50 text-gray-800 text-base md:text-xl lg:text-3xl font-bold rounded-lg lg:rounded-xl shadow-sm border border-gray-100 active:bg-orange-100 active:scale-95 transition-all flex items-center justify-center py-1.5 md:py-2 lg:py-3"
                        style={{ touchAction: 'manipulation' }}
                      >
                        {num}
                      </button>
                    ))}
                    <button
                      onClick={() => handleMissionInput('delete')}
                      className="bg-rose-50 hover:bg-rose-100 text-rose-500 text-xs md:text-sm lg:text-base font-bold rounded-lg lg:rounded-xl shadow-sm border border-rose-100 active:scale-95 transition-all flex items-center justify-center py-1.5 md:py-2 lg:py-3"
                      style={{ touchAction: 'manipulation' }}
                    >
                      지우기
                    </button>
                    <button
                      onClick={() => handleMissionInput('0')}
                      className="bg-gray-50 hover:bg-orange-50 text-gray-800 text-base md:text-xl lg:text-3xl font-bold rounded-lg lg:rounded-xl shadow-sm border border-gray-100 active:bg-orange-100 active:scale-95 transition-all flex items-center justify-center py-1.5 md:py-2 lg:py-3"
                      style={{ touchAction: 'manipulation' }}
                    >
                      0
                    </button>
                    <button
                      onClick={() => {
                        const next = findNextMissionCell(missionAnswers, missionIdx);
                        if (next) {
                          setActiveCell(next);
                          setMissionInput('');
                        }
                      }}
                      className="bg-amber-100 hover:bg-amber-200 text-amber-700 text-[10px] md:text-xs lg:text-sm font-bold rounded-lg lg:rounded-xl shadow-sm border border-amber-200 active:scale-95 transition-all flex items-center justify-center py-1.5 md:py-2 lg:py-3 gap-1"
                      style={{ touchAction: 'manipulation' }}
                    >
                      <i className="fa-solid fa-forward text-[10px]"></i>다음 칸
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // 6. 게임 플레이 화면
      return (
        <div className="flex flex-col h-[100dvh] font-sans relative pt-10 overflow-hidden bg-gray-50">
          <AcademyHeader />

          {showExitModal && (
            <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
              <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full text-center animate-bounce-in">
                <div className="bg-red-100 p-4 rounded-full text-red-500 inline-block mb-4">
                  <i className="fa-solid fa-triangle-exclamation text-4xl"></i>
                </div>
                <h2 className="text-2xl font-black text-gray-800 mb-2">정말 나가시겠어요?</h2>
                <p className="text-gray-600 mb-8 font-medium">지금 나가면 진행 중이던<br/>기록이 모두 <span className="text-red-500 font-bold">초기화</span>됩니다.</p>
                <div className="flex gap-3">
                  <button onClick={() => setShowExitModal(false)} className="flex-1 py-4 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-2xl font-bold text-lg transition-colors active:scale-95">
                    계속 풀기
                  </button>
                  <button onClick={handleExitGame} className="flex-1 py-4 bg-red-500 hover:bg-red-600 text-white rounded-2xl font-bold text-lg transition-colors shadow-md active:scale-95">
                    나가기
                  </button>
                </div>
              </div>
            </div>
          )}

          <div className="bg-white p-3 md:p-4 shadow-sm flex justify-between items-center px-4 md:px-12 relative z-0 shrink-0">
            <div className="flex items-center gap-2 md:gap-3">
              <button 
                onClick={() => setShowExitModal(true)} 
                className="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center text-gray-500 bg-white border-2 border-gray-200 hover:bg-red-50 hover:text-red-500 hover:border-red-200 rounded-xl transition-all active:scale-95 shadow-sm mr-1"
                title="뒤로 가기"
              >
                <i className="fa-solid fa-arrow-left text-xl md:text-2xl"></i>
              </button>
              <div className="flex items-center gap-2 md:gap-3 bg-gray-100 px-3 py-2 rounded-xl shadow-inner">
                {gameMode === 'time' ? (
                  <><i className="fa-solid fa-stopwatch text-rose-500 text-xl md:text-2xl"></i><span className="text-xl md:text-2xl font-bold text-gray-700">{formatTime(time)}</span></>
                ) : (
                  <><i className="fa-solid fa-bullseye text-teal-500 text-xl md:text-2xl"></i><span className="text-xl md:text-2xl font-bold text-gray-700">{score} / {totalProblemsRef.current}</span></>
                )}
              </div>
            </div>
            
            {/* 상단 정중앙에 현재 모드 */}
            <div className="hidden md:block absolute left-1/2 -translate-x-1/2 bg-indigo-50 text-indigo-500 px-4 py-1 rounded-full font-bold border border-indigo-100 z-10">
              {gameMode === 'mistake_practice' ? `오답 모아 풀기 (${operatorType === 'x' ? '구구단' : operatorType === '+' ? '더하기' : '빼기'})` : operatorType === 'x' ? (multiplyDan === 'all' ? '구구단 전체 섞어서' : `구구단 ${multiplyDan}단`) : (operatorType === '+' ? '더하기 연습' : '빼기 연습')}
            </div>
            
            {gameMode === 'time' && (
              <div className="text-lg md:text-xl font-bold text-indigo-600 bg-indigo-50 px-3 py-2 rounded-xl border border-indigo-100">
                {score} {operatorType === 'x' ? `/ ${totalProblemsRef.current}` : '문제'}
              </div>
            )}
            {gameMode !== 'time' && (
              <div className="flex items-center gap-2 text-lg md:text-xl font-bold text-gray-600 bg-gray-100 px-3 py-2 rounded-xl shadow-inner">
                <i className="fa-regular fa-clock text-gray-400"></i>
                {formatTime(time)}
              </div>
            )}
          </div>

          <div className="flex-1 flex flex-col items-center justify-center p-4 min-h-0">
            <div className={`flex items-center justify-center gap-2 md:gap-4 text-5xl md:text-6xl lg:text-7xl font-black text-gray-800 transition-transform ${feedback === 'wrong' ? 'animate-shake' : ''}`}>
              <span>{problem.num1}</span>
              <span className={problem.operator === '+' ? 'text-rose-500' : problem.operator === '-' ? 'text-blue-500' : 'text-purple-500'}>
                {problem.operator}
              </span>
              <span>{problem.num2}</span>
              <span>=</span>
              
              <div className={`relative min-w-[90px] md:min-w-[120px] h-[70px] md:h-[90px] rounded-2xl border-4 flex items-center justify-center bg-white shadow-inner
                ${feedback === 'correct' ? 'border-green-500 bg-green-50' : 
                  feedback === 'wrong' ? 'border-red-500 bg-red-50' : 'border-indigo-300'}
              `}>
                {feedback === 'correct' ? (
                  <i className="fa-solid fa-check text-green-500 text-4xl md:text-5xl"></i>
                ) : feedback === 'wrong' ? (
                  <i className="fa-solid fa-xmark text-red-500 text-4xl md:text-5xl"></i>
                ) : (
                  <span className="text-indigo-600 text-4xl md:text-6xl">{userInput || <span className="text-gray-300">?</span>}</span>
                )}
              </div>
            </div>
          </div>

          <div className="bg-white rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.05)] p-4 md:p-6 z-20 relative shrink-0">
            <div className="max-w-2xl mx-auto grid grid-cols-3 gap-2 md:gap-4 h-[45dvh] min-h-[250px] max-h-[450px]">
              {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => (
                <button
                  key={num}
                  onClick={() => handleKeypadPress(num.toString())}
                  className="bg-gray-50 hover:bg-indigo-50 text-gray-800 text-3xl md:text-5xl font-bold rounded-2xl shadow-sm border border-gray-100 active:bg-indigo-100 active:scale-95 transition-all flex items-center justify-center h-full w-full"
                  style={{ touchAction: 'manipulation' }}
                >
                  {num}
                </button>
              ))}
              <button
                onClick={() => handleKeypadPress('delete')}
                className="bg-rose-50 hover:bg-rose-100 text-rose-500 text-xl md:text-2xl font-bold rounded-2xl shadow-sm border border-rose-100 active:scale-95 transition-all flex items-center justify-center h-full w-full"
                style={{ touchAction: 'manipulation' }}
              >
                지우기
              </button>
              <button
                onClick={() => handleKeypadPress('0')}
                className="bg-gray-50 hover:bg-indigo-50 text-gray-800 text-3xl md:text-5xl font-bold rounded-2xl shadow-sm border border-gray-100 active:bg-indigo-100 active:scale-95 transition-all flex items-center justify-center h-full w-full"
                style={{ touchAction: 'manipulation' }}
              >
                0
              </button>
              <button
                onClick={() => handleKeypadPress('enter')}
                className="bg-indigo-600 hover:bg-indigo-700 text-white text-2xl md:text-3xl font-black rounded-2xl shadow-md active:scale-95 transition-all flex items-center justify-center h-full w-full"
                style={{ touchAction: 'manipulation' }}
              >
                확인
              </button>
            </div>
          </div>
        </div>
      );
    }

    function RecordItem({ record, formatTime, formatDate, isToday }) {
      const isMultiplication = record.operator.includes('x') || record.operator.includes('구구단');
      let opText = record.operator;
      if (opText === '+') opText = '더하기';
      else if (opText === '-') opText = '빼기';
      else if (opText.startsWith('x ')) opText = opText.replace('x ', '구구단');

      const modeBgColor =
        record.mode === 'time' ? 'bg-rose-500' :
        record.mode === 'mistake_practice' ? 'bg-orange-500' :
        record.mode === 'mission' ? 'bg-amber-500' :
        'bg-teal-500';
      const modeLabel =
        record.mode === 'time' ? '타임어택' :
        record.mode === 'mistake_practice' ? '오답풀기' :
        record.mode === 'mission' ? '미션모드' :
        '스피드런';

      return (
        <div className={`p-4 rounded-2xl border flex items-center justify-between transition-colors shadow-sm ${isToday ? 'bg-indigo-50 border-indigo-100' : 'bg-gray-50 border-gray-100'}`}>
          <div>
            <div className="flex items-center gap-2 mb-1">
              <span className={`px-2 py-1 rounded-lg text-xs font-bold text-white shadow-sm ${modeBgColor}`}>
                {modeLabel}
              </span>
              <span className={`px-2 py-1 rounded-lg text-xs font-bold text-white shadow-sm ${isMultiplication ? 'bg-purple-500' : record.operator === '+' ? 'bg-indigo-500' : 'bg-blue-500'}`}>
                {opText}
              </span>
            </div>
            <p className="text-xs text-gray-500 font-bold">{formatDate(record.timestamp)}</p>
          </div>
          <div className="text-right">
            {record.mode === 'time' ? (
              <div>
                <span className="text-2xl font-black text-rose-600">{record.score}</span>
                <span className="text-gray-500 font-bold ml-1 text-sm">문제</span>
              </div>
            ) : record.mode === 'mission' ? (
              <div className="flex flex-col items-end">
                <span className="text-2xl font-black text-amber-600">{formatTime(record.time)}</span>
                {record.mistakes && record.mistakes.length > 0 && (
                  <span className="text-xs text-red-500 font-bold">{record.mistakes.length}번 틀림</span>
                )}
              </div>
            ) : (
              <span className="text-2xl font-black text-teal-600">{formatTime(record.time)}</span>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MathPracticeApp />);
  </script>
</body>
</html>
